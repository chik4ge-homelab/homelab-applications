apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-mcp
  namespace: argocd
spec:
  project: default
  sources:
    - chart: kubernetes-mcp-server
      repoURL: ghcr.io/containers/charts
      targetRevision: 0.1.0
      helm:
        releaseName: kubernetes-mcp
        valuesObject:
          fullnameOverride: kubernetes-mcp
          ingress:
            enabled: false
          httpRoute:
            enabled: false
          replicaCount: 1
          image:
            version: v0.0.63 # renovate: datasource=docker depName=quay.io/containers/kubernetes_mcp_server
          service:
            port: 8080
          config:
            port: "8080"
            read_only: true
            disable_destructive: true
            stateless: true
            cluster_provider_strategy: in-cluster
            toolsets:
              - core
            denied_resources:
              - group: ""
                version: v1
                kind: Secret
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          rbac:
            extraClusterRoleBindings:
              - name: view
                roleRef:
                  name: view
                  external: true
    - repoURL: https://github.com/chik4ge-homelab/homelab-applications
      targetRevision: main
      path: manifests/platform/services/mcp/kubernetes
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: mcp-kubernetes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
