apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  template:
    spec:
      containers:
        - name: bluetoothd
          image: ghcr.io/home-assistant/home-assistant:2026.5.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              mkdir -p /run/dbus
              dbus-daemon --system --nofork --nopidfile --address=unix:path=/run/dbus/system_bus_socket &
              until [ -S /run/dbus/system_bus_socket ]; do sleep 0.2; done
              exec /usr/lib/bluetooth/bluetoothd --experimental --nodetach
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: dbus-run
              mountPath: /run/dbus
            - name: usb-bus
              mountPath: /dev/bus/usb
