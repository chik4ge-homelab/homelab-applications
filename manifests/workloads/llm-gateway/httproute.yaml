apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-gateway
  labels:
    app.kubernetes.io/name: llm-gateway
spec:
  parentRefs:
  - name: envoy-gateway-internal
    namespace: envoy-gateway
    sectionName: https
  hostnames:
  - llm-gateway.chik4ge.me
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: llama-cpp-api
      port: 8000
