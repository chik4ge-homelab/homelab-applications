apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-discord-admin-roles-patch
  labels:
    app.kubernetes.io/name: hermes
data:
  patch.py: |
    from pathlib import Path

    path = Path("/opt/hermes/gateway/platforms/discord.py")
    if not path.exists():
        raise SystemExit(0)

    source = path.read_text()

    replacements = {
        "self._allowed_role_ids: set = set()  # For DISCORD_ALLOWED_ROLES filtering":
            "self._allowed_role_ids: set = set()  # For DISCORD_ALLOWED_ROLES filtering\n"
            "        self._admin_role_ids: set = set()  # For DISCORD_ADMIN_ROLES approval authorization",
        "            # Set up intents.":
            "            admin_roles_env = os.getenv(\"DISCORD_ADMIN_ROLES\", \"\")\n"
            "            if admin_roles_env:\n"
            "                self._admin_role_ids = {\n"
            "                    int(rid.strip()) for rid in admin_roles_env.split(\",\")\n"
            "                    if rid.strip().isdigit()\n"
            "                }\n\n"
            "            # Set up intents.",
        "                or bool(self._allowed_role_ids)  # Need members intent for role lookup":
            "                or bool(self._allowed_role_ids)\n"
            "                or bool(self._admin_role_ids)  # Need members intent for role lookup",
        "                allowed_role_ids=self._allowed_role_ids,":
            "                allowed_role_ids=self._admin_role_ids or self._allowed_role_ids,",
    }

    for old, new in replacements.items():
        if new in source:
            continue
        if old not in source:
            raise SystemExit(f"patch target not found: {old!r}")
        source = source.replace(old, new, 1)

    path.write_text(source)
