apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      annotations:
        descheduler.alpha.kubernetes.io/prefer-no-eviction: "true"
      labels:
        app.kubernetes.io/name: hermes
    spec:
      serviceAccountName: hermes
      automountServiceAccountToken: false
      enableServiceLinks: false
      initContainers:
      - name: generate-terminal-ssh-key
        image: lscr.io/linuxserver/openssh-server:latest
        command:
        - sh
        - -c
        - |
          mkdir -p /ssh
          if [ ! -s /ssh/id_ed25519 ]; then
            ssh-keygen -t ed25519 -N "" -f /ssh/id_ed25519
          fi
          chmod 600 /ssh/id_ed25519
          chmod 644 /ssh/id_ed25519.pub
        volumeMounts:
        - name: terminal-ssh-key
          mountPath: /ssh

      - name: install-config
        image: busybox:1.37
        command:
        - sh
        - -c
        - |
          cp /config/config.yaml /opt/data/config.yaml
          cat > /opt/data/.env <<EOF
          HERMES_INFERENCE_PROVIDER=custom
          HERMES_TIMEZONE=Asia/Tokyo
          DISCORD_COMMAND_SYNC_POLICY=safe
          DISCORD_ALLOWED_USERS=0
          DISCORD_HOME_CHANNEL=${DISCORD_HOME_CHANNEL}
          DISCORD_ALLOWED_CHANNELS=${DISCORD_ALLOWED_CHANNELS}
          DISCORD_ALLOWED_ROLES=${DISCORD_ALLOWED_ROLES}
          DISCORD_ADMIN_ROLES=${DISCORD_ADMIN_ROLES}
          EOF
        volumeMounts:
        - name: hermes-config
          mountPath: /config
        - name: hermes-data
          mountPath: /opt/data
        env:
        - name: DISCORD_ALLOWED_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ALLOWED_ROLES
        - name: DISCORD_ADMIN_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ADMIN_ROLES
        - name: DISCORD_HOME_CHANNEL
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_HOME_CHANNEL
        - name: DISCORD_ALLOWED_CHANNELS
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_HOME_CHANNEL

      containers:
      - name: hermes
        image: nousresearch/hermes-agent:latest
        command:
        - sh
        - -c
        - python3 /patch/patch.py && exec /opt/hermes/.venv/bin/hermes "$0" "$@"
        args:
        - gateway
        - run
        ports:
        - name: gateway
          containerPort: 8642

        env:
        - name: HERMES_HOME
          value: /opt/data
        - name: HERMES_INFERENCE_PROVIDER
          value: custom
        - name: HERMES_TIMEZONE
          value: Asia/Tokyo
        - name: TERMINAL_ENV
          value: ssh
        - name: TERMINAL_CWD
          value: /workspace
        - name: TERMINAL_SSH_HOST
          value: 127.0.0.1
        - name: TERMINAL_SSH_USER
          value: hermes-terminal
        - name: TERMINAL_SSH_PORT
          value: "2222"
        - name: TERMINAL_SSH_KEY
          value: /terminal-ssh/id_ed25519
        - name: BROWSER_CDP_URL
          value: http://127.0.0.1:9222
        - name: DISCORD_COMMAND_SYNC_POLICY
          value: safe
        - name: DISCORD_ALLOWED_USERS
          value: "0"
        - name: DISCORD_HOME_CHANNEL
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_HOME_CHANNEL
        - name: DISCORD_ALLOWED_CHANNELS
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_HOME_CHANNEL
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_BOT_TOKEN
        - name: DISCORD_ALLOWED_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ALLOWED_ROLES
        - name: DISCORD_ADMIN_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ADMIN_ROLES

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi

        volumeMounts:
        - name: discord-admin-roles-patch
          mountPath: /patch
          readOnly: true
        - name: hermes-data
          mountPath: /opt/data
        - name: terminal-ssh-key
          mountPath: /terminal-ssh
          readOnly: true

      - name: llm-gateway-proxy
        image: caddy:2.10.2-alpine
        command:
        - caddy
        args:
        - run
        - --config
        - /etc/caddy/Caddyfile
        ports:
        - name: llm-proxy
          containerPort: 8000
        env:
        - name: LLM_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-llm-gateway
              key: LLM_GATEWAY_API_KEY
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        volumeMounts:
        - name: hermes-config
          mountPath: /etc/caddy
          readOnly: true

      - name: terminal
        image: lscr.io/linuxserver/openssh-server:latest
        command:
        - sh
        - -c
        - apk add --no-cache python3 py3-pip && exec /init
        ports:
        - name: terminal-ssh
          containerPort: 2222
        env:
        - name: TZ
          value: Asia/Tokyo
        - name: USER_NAME
          value: hermes-terminal
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: PASSWORD_ACCESS
          value: "false"
        - name: SUDO_ACCESS
          value: "false"
        - name: PUBLIC_KEY_FILE
          value: /terminal-ssh/id_ed25519.pub
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: terminal-ssh-key
          mountPath: /terminal-ssh
          readOnly: true
        - name: hermes-data
          mountPath: /opt/data/cache/documents
          subPath: cache/documents
        - name: hermes-data
          mountPath: /opt/data/cache/images
          subPath: cache/images
        - name: hermes-data
          mountPath: /opt/data/cache/screenshots
          subPath: cache/screenshots
        - name: terminal-config
          mountPath: /config
        - name: terminal-workspace
          mountPath: /workspace

      - name: browser
        image: chromedp/headless-shell:latest
        args:
        - --headless=new
        - --user-data-dir=/tmp/chrome-profile
        - --no-first-run
        - --no-default-browser-check
        - --no-sandbox
        - --disable-gpu
        - --disable-software-rasterizer
        - --disable-dev-shm-usage
        ports:
        - name: browser-cdp
          containerPort: 9222
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 1Gi

      volumes:
      - name: discord-admin-roles-patch
        configMap:
          name: hermes-discord-admin-roles-patch
      - name: hermes-config
        configMap:
          name: hermes-config
      - name: hermes-data
        persistentVolumeClaim:
          claimName: hermes-data
      - name: terminal-ssh-key
        emptyDir: {}
      - name: terminal-config
        emptyDir: {}
      - name: terminal-workspace
        emptyDir: {}
