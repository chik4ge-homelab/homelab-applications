apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      annotations:
        descheduler.alpha.kubernetes.io/prefer-no-eviction: "true"
      labels:
        app.kubernetes.io/name: hermes
    spec:
      serviceAccountName: hermes
      automountServiceAccountToken: false
      enableServiceLinks: false
      initContainers:
      - name: prepare-attachments
        image: busybox:1.38
        command:
        - sh
        - -c
        - chmod 755 /attachments
        volumeMounts:
        - name: hermes-data
          mountPath: /attachments
          subPath: attachments

      containers:
      - name: control-plane
        image: ghcr.io/chik4ge/pi-discord-agent-control-plane:v1.0.3
        env:
        - name: TZ
          value: Asia/Tokyo
        - name: HOME
          value: /opt/pi
        - name: PI_CODING_AGENT_DIR
          value: /opt/pi/.pi/agent
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_BOT_TOKEN
        - name: LLM_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-llm-gateway
              key: LLM_GATEWAY_API_KEY
        - name: LLM_BASE_URL
          value: http://llama-cpp-api.llm-gateway.svc.cluster.local:8000/v1
        - name: PI_REMOTE_TOOLS_HOST
          value: 127.0.0.1
        - name: PI_REMOTE_TOOLS_PORT
          value: "2222"
        - name: PI_REMOTE_TOOLS_USER
          value: pi-executor
        - name: PI_REMOTE_TOOLS_KEY
          value: /ssh/id_ed25519
        - name: PI_REMOTE_TOOLS_WORKSPACE
          value: /workspace
        - name: PI_REMOTE_TOOLS_ATTACHMENTS_ROOT
          value: /attachments
        - name: PI_REMOTE_TOOLS_TIMEOUT_SECONDS
          value: "120"
        - name: PI_REMOTE_TOOLS_MAX_OUTPUT_BYTES
          value: "26214400"
        - name: PISCORD_ATTACHMENTS_DIR
          value: /attachments
        - name: TRIGGER_NAME
          value: pi
        - name: CHANNEL_POLICY
          value: open-trigger
        - name: AUTO_REGISTER_DMS
          value: "false"
        - name: MAX_CONCURRENCY
          value: "1"
        - name: MAX_SCHEDULED_CONCURRENCY
          value: "1"
        - name: LOG_LEVEL
          value: info
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        volumeMounts:
        - name: hermes-config
          mountPath: /config
          readOnly: true
        - name: hermes-data
          mountPath: /opt/pi
          subPath: pi
        - name: hermes-data
          mountPath: /var/lib/piscord
          subPath: piscord
        - name: hermes-data
          mountPath: /attachments
          subPath: attachments
        - name: ssh-data
          mountPath: /ssh

      - name: executor
        image: ghcr.io/chik4ge/pi-discord-agent-executor:v1.0.3
        ports:
        - name: ssh
          containerPort: 2222
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 1Gi
        volumeMounts:
        - name: hermes-data
          mountPath: /workspace
          subPath: workspace
        - name: hermes-data
          mountPath: /attachments
          subPath: attachments
          readOnly: true
        - name: ssh-data
          mountPath: /ssh
          readOnly: true

      volumes:
      - name: hermes-config
        projected:
          sources:
          - configMap:
              name: hermes-config
          - secret:
              name: hermes-channels
      - name: hermes-data
        persistentVolumeClaim:
          claimName: hermes-data
      - name: ssh-data
        emptyDir: {}
