apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      annotations:
        descheduler.alpha.kubernetes.io/prefer-no-eviction: "true"
      labels:
        app.kubernetes.io/name: hermes
    spec:
      serviceAccountName: hermes
      automountServiceAccountToken: false
      enableServiceLinks: false
      initContainers:
      - name: install-config
        image: busybox:1.37
        command:
        - sh
        - -c
        - |
          cp /config/config.yaml /opt/data/config.yaml
          cat > /opt/data/.env <<EOF
          HERMES_INFERENCE_PROVIDER=custom
          HERMES_TIMEZONE=Asia/Tokyo
          DISCORD_COMMAND_SYNC_POLICY=safe
          DISCORD_ALLOWED_USERS=0
          DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
          DISCORD_ALLOWED_ROLES=${DISCORD_ALLOWED_ROLES}
          DISCORD_ADMIN_ROLES=${DISCORD_ADMIN_ROLES}
          LLM_GATEWAY_API_KEY=${LLM_GATEWAY_API_KEY}
          EOF
        volumeMounts:
        - name: hermes-config
          mountPath: /config
        - name: hermes-data
          mountPath: /opt/data
        env:
        - name: LLM_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-llm-gateway
              key: LLM_GATEWAY_API_KEY
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_BOT_TOKEN
        - name: DISCORD_ALLOWED_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ALLOWED_ROLES
        - name: DISCORD_ADMIN_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ADMIN_ROLES

      containers:
      - name: hermes
        image: nousresearch/hermes-agent:latest
        command:
        - sh
        - -c
        - python3 /patch/patch.py && exec /opt/hermes/.venv/bin/hermes "$0" "$@"
        args:
        - gateway
        - run
        ports:
        - name: gateway
          containerPort: 8642

        env:
        - name: HERMES_HOME
          value: /opt/data
        - name: HERMES_INFERENCE_PROVIDER
          value: custom
        - name: HERMES_TIMEZONE
          value: Asia/Tokyo
        - name: DISCORD_COMMAND_SYNC_POLICY
          value: safe
        - name: DISCORD_ALLOWED_USERS
          value: "0"
        - name: LLM_GATEWAY_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-llm-gateway
              key: LLM_GATEWAY_API_KEY
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_BOT_TOKEN
        - name: DISCORD_ALLOWED_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ALLOWED_ROLES
        - name: DISCORD_ADMIN_ROLES
          valueFrom:
            secretKeyRef:
              name: hermes-discord
              key: DISCORD_ADMIN_ROLES

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi

        volumeMounts:
        - name: discord-admin-roles-patch
          mountPath: /patch
          readOnly: true
        - name: hermes-data
          mountPath: /opt/data

      volumes:
      - name: discord-admin-roles-patch
        configMap:
          name: hermes-discord-admin-roles-patch
      - name: hermes-config
        configMap:
          name: hermes-config
      - name: hermes-data
        persistentVolumeClaim:
          claimName: hermes-data
