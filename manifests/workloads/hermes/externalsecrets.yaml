apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-llm-gateway
  labels:
    app.kubernetes.io/name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: LLM_GATEWAY_API_KEY
      remoteRef:
        key: llm-gateway_token
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-discord
  labels:
    app.kubernetes.io/name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: hermes_discord
        property: bot_token
    - secretKey: DISCORD_ALLOWED_ROLES
      remoteRef:
        key: hermes_discord
        property: allowed_roles
    - secretKey: DISCORD_ADMIN_ROLES
      remoteRef:
        key: hermes_discord
        property: admin_roles
