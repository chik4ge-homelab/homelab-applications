apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-image-pull-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  target:
    name: github-image-pull-secret
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: "GitHub imagePullSecret"
        property: "ユーザ名"
    - secretKey: password
      remoteRef:
        key: "GitHub imagePullSecret"
        property: "認証情報"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-channels
  labels:
    app.kubernetes.io/name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  target:
    name: hermes-channels
    template:
      engineVersion: v2
      data:
        channels.json: |
          {
            "channels": [
              {
                "id": "{{ .home_channel }}",
                "name": "home",
                "main": true
              }
            ]
          }
  data:
    - secretKey: home_channel
      remoteRef:
        key: hermes_discord
        property: home_channel
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-llm-gateway
  labels:
    app.kubernetes.io/name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: LLM_GATEWAY_API_KEY
      remoteRef:
        key: llm-gateway_token
        property: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-discord
  labels:
    app.kubernetes.io/name: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: hermes_discord
        property: bot_token
    - secretKey: DISCORD_ALLOWED_ROLES
      remoteRef:
        key: hermes_discord
        property: allowed_roles
    - secretKey: DISCORD_ADMIN_ROLES
      remoteRef:
        key: hermes_discord
        property: admin_roles
    - secretKey: DISCORD_HOME_CHANNEL
      remoteRef:
        key: hermes_discord
        property: home_channel
