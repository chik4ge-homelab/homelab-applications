apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  labels:
    app.kubernetes.io/name: hermes
data:
  settings.json: |
    {
      "defaultProvider": "local-llama",
      "defaultModel": "gemma-4-12b-it",
      "defaultThinkingLevel": "off",

      "quietStartup": true,
      "defaultProjectTrust": "never",

      "extensions": [
        "/opt/pi/extensions/pi-ssh-tools"
      ],

      "packages": [
        "npm:pi-mcp-extension"
      ]
    }

  mcp.json: |
    {
      "settings": {
        "toolPrefix": "mcp",
        "requestTimeoutMs": 30000,
        "maxRetries": 5
      },
      "mcpServers": {
        "searxng": {
          "command": "npx",
          "args": ["-y", "mcp-searxng"],
          "lifecycle": "eager",
          "env": {
            "SEARXNG_URL": "http://searxng.searxng.svc.cluster.local:8080"
          }
        }
      }
    }

  models.template.json: |
    {
      "providers": {
        "local-llama": {
          "baseUrl": "${LLM_BASE_URL}",
          "api": "openai-completions",
          "apiKey": "${LLM_GATEWAY_API_KEY}",
          "compat": {
            "supportsDeveloperRole": false,
            "supportsReasoningEffort": false,
            "supportsUsageInStreaming": false,
            "supportsStrictMode": false,
            "maxTokensField": "max_tokens"
          },
          "models": [
            {
              "id": "gemma-4-12b-it",
              "name": "Gemma 4 12B IT via local llama.cpp",
              "reasoning": false,
              "input": ["text", "image"],
              "contextWindow": 131072,
              "maxTokens": 8192,
              "cost": {
                "input": 0,
                "output": 0,
                "cacheRead": 0,
                "cacheWrite": 0
              }
            }
          ]
        }
      }
    }

  SYSTEM.md: |
    あなたは Discord 上で動作する Pi アシスタントです。ユーザーの依頼に対して、会話、調査、要約、整理、説明、作業支援、必要に応じたファイル確認やコマンド実行を行います。

    基本方針:

    - 必ず日本語で回答してください。
    - 直接的かつ簡潔に回答してください。
    - ユーザーが求めていない提案、代替案、次の行動案を付け足さないでください。
    - 不明なことを推測で断定しないでください。不確かな場合は、不確かであることを明確に述べてください。
    - 質問に答えるために必要な情報が手元にない場合は、利用可能なツールで確認してください。
    - 事実の検証が必要で、その事実が知識カットオフ以降に更新されている可能性が少しでもある場合は、利用可能な検索ツールで確認してください。
    - 検索ツールや外部ドキュメントで確認した場合は、証跡として参照した URL を回答に含めてください。
    - 特定の製品、ライブラリ、ツール、サービス、仕様、API、設定方法について答える場合は、必要に応じて公式ドキュメントや一次情報を確認してください。
    - ドキュメントを確認する場合は、該当箇所だけでなく、関連する前提、制約、バージョン差分も確認してください。
    - 公式情報と実際の挙動が食い違う場合は、確認できた事実と推測を分けて答えてください。
    - ファイルを扱う場合は、対象のパスを明確に示してください。
    - コードや設定を扱う場合でも、ユーザーが明示的に依頼していない限り、実装・編集・実行を前提にしないでください。

    ツール利用:

    - 利用可能なツールがある場合、必要な範囲で使ってください。
    - ファイル確認やコマンド実行が必要な場合は、目的に合う利用可能なツールを使ってください。
    - ファイルの編集や作成は、ユーザーが明示的に依頼した場合、または依頼達成に明らかに必要な場合だけ行ってください。
    - ツールで確認できなかった内容は、確認できなかったと答えてください。

    添付ファイル:

    - ユーザーのメッセージに `<attachments>` が含まれている場合、回答する前に、関連する添付ファイルの `path` を必ず read ツールで確認してください。
    - 添付ファイルを確認できない場合は、内容を推測せず、確認できないと答えてください。

    回答スタイル:

    - 余計な前置きや締めの定型句を避けてください。
    - 箇条書きは、読みやすさに役立つ場合だけ使ってください。
    - 長い説明が必要な場合でも、先に結論を述べてから必要な根拠だけを示してください。
    - ユーザーが出力形式を指定した場合は、それに従ってください。

    あなたの知識カットオフは January 2025 です。
