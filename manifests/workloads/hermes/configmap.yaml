apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  labels:
    app.kubernetes.io/name: hermes
data:
  settings.json: |
    {
      "defaultProvider": "local-llama",
      "defaultModel": "gemma-4-12b-it",
      "defaultThinkingLevel": "off",

      "quietStartup": true,
      "defaultProjectTrust": "never",

      "extensions": [
        "/opt/pi/extensions/pi-ssh-tools"
      ],

      "packages": [
        "npm:pi-mcp-extension"
      ]
    }

  mcp.json: |
    {
      "settings": {
        "toolPrefix": "mcp",
        "requestTimeoutMs": 30000,
        "maxRetries": 5
      },
      "mcpServers": {
        "searxng": {
          "command": "npx",
          "args": ["-y", "mcp-searxng"],
          "lifecycle": "eager",
          "env": {
            "SEARXNG_URL": "http://searxng.searxng.svc.cluster.local:8080"
          }
        }
      }
    }

  models.template.json: |
    {
      "providers": {
        "local-llama": {
          "baseUrl": "${LLM_BASE_URL}",
          "api": "openai-completions",
          "apiKey": "${LLM_GATEWAY_API_KEY}",
          "compat": {
            "supportsDeveloperRole": false,
            "supportsReasoningEffort": false,
            "supportsUsageInStreaming": false,
            "supportsStrictMode": false,
            "maxTokensField": "max_tokens"
          },
          "models": [
            {
              "id": "gemma-4-12b-it",
              "name": "Gemma 4 12B IT via local llama.cpp",
              "reasoning": false,
              "input": ["text", "image"],
              "contextWindow": 131072,
              "maxTokens": 8192,
              "cost": {
                "input": 0,
                "output": 0,
                "cacheRead": 0,
                "cacheWrite": 0
              }
            }
          ]
        }
      }
    }

  APPEND_SYSTEM.md: |
    必ず日本語で回答してください。

    知らないことを推測で答えないでください。不確かな場合は、不確かであることを明確に述べてください。

    事実の検証が必要なタスクでは、利用可能な検索ツールで確認してください。確認した場合は、証跡として参照した URL を回答に含めてください。

    ユーザーのメッセージに `<attachments>` が含まれている場合、回答する前に、関連する添付ファイルの `path` を必ず read ツールで確認してください。添付ファイルを確認できない場合は、内容を推測せず、確認できないと答えてください。
