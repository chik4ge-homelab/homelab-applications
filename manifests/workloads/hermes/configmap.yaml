apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  labels:
    app.kubernetes.io/name: hermes
data:
  config.yaml: |
    model:
      provider: custom
      default: Qwen/Qwen3.5-9B
      base_url: http://127.0.0.1:8000/v1
      api_key: hermes-proxy
      api_mode: openai

    terminal:
      backend: local

    display:
      language: ja

    group_sessions_per_user: true

  Caddyfile: |
    {
      admin off
    }

    http://127.0.0.1:8000 {
      reverse_proxy http://llama-cpp-api.llm-gateway.svc.cluster.local:8000 {
        header_up Authorization "Bearer {$LLM_GATEWAY_API_KEY}"
      }
    }
