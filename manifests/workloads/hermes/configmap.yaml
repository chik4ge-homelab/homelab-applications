apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  labels:
    app.kubernetes.io/name: hermes
data:
  config.yaml: |
    model:
      provider: custom
      default: Qwen/Qwen3.5-9B
      base_url: http://llama-cpp-api.llm-gateway.svc.cluster.local:8000/v1
      api_key: ${LLM_GATEWAY_API_KEY}
      api_mode: openai

    terminal:
      backend: local

    group_sessions_per_user: true
