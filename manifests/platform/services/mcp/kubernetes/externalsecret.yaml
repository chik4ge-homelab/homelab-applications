apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kubernetes-mcp-tunnel
  labels:
    app.kubernetes.io/name: kubernetes-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: control-plane-api-key
      remoteRef:
        key: OpenAI Tunnel Control Panel API Key
        property: credential
    - secretKey: tunnel-id
      remoteRef:
        key: Kubernetes MCP ChatGPT Tunnel
        property: tunnel_id
