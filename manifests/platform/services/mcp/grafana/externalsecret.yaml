apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-service-account
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: token
      remoteRef:
        key: "grafana-service-account"
        property: token
