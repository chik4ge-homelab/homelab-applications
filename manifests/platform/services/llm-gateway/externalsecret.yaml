apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-gateway-api-key
  labels:
    app.kubernetes.io/name: llm-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: 1password-connect
    kind: ClusterSecretStore
  data:
    - secretKey: api-key
      remoteRef:
        key: llm-gateway_token
        property: token
