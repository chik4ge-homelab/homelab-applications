apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp
  labels:
    app.kubernetes.io/name: llm-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-gateway
  template:
    metadata:
      annotations:
        descheduler.alpha.kubernetes.io/prefer-no-eviction: "true"
      labels:
        app.kubernetes.io/name: llm-gateway
    spec:
      runtimeClassName: nvidia
      containers:
      - name: llama-cpp
        image: ghcr.io/ggml-org/llama.cpp:server-cuda
        imagePullPolicy: Always
        args:
        - -hf
        - w-ahmad/Gemma-4-12B-it-qat-GGUF-MoQ
        - --hf-file
        - MoQ-Quants/MoQ-3.75.gguf
        - --mmproj-url
        - https://huggingface.co/ggml-org/gemma-4-12B-it-GGUF/resolve/main/mmproj-gemma-4-12B-it-bf16.gguf
        - --alias
        - google/gemma-4-12b-it
        - --chat-template-file
        - /etc/llama/chat_template.jinja
        - --chat-template-kwargs
        - '{"preserve_thinking":true}'

        - --host
        - 0.0.0.0
        - --port
        - "8000"

        - -c
        - "131072"

        - -ngl
        - all

        - --flash-attn
        - "on"

        - -ctk
        - q8_0
        - -ctv
        - q8_0

        - -b
        - "512"
        - -ub
        - "512"

        - -np
        - "1"

        - --no-warmup

        - -n
        - "-1"

        - --cache-ram
        - "0"

        - --api-key-file
        - /run/secrets/llm-gateway/api-key

        ports:
        - containerPort: 8000

        env:
        - name: HF_HOME
          value: /root/.cache/huggingface

        resources:
          requests:
            cpu: "2"
            memory: 3Gi
            nvidia.com/gpu: "1"
          limits:
            memory: 3Gi
            nvidia.com/gpu: "1"

        volumeMounts:
        - name: llama-cpp-cache
          mountPath: /root/.cache/huggingface
        - name: llm-gateway-api-key
          mountPath: /run/secrets/llm-gateway
          readOnly: true
        - name: llama-cpp-chat-template
          mountPath: /etc/llama
          readOnly: true

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 18

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 6

      volumes:
      - name: llama-cpp-cache
        persistentVolumeClaim:
          claimName: llama-cpp-cache
      - name: llm-gateway-api-key
        secret:
          secretName: llm-gateway-api-key
      - name: llama-cpp-chat-template
        configMap:
          name: llama-cpp-chat-template
